services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    ports:
      - "8000:8000"
    # Volume mount for dev hot-reload; remove in production
    volumes:
      - ./backend:/app
    environment:
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    # Redis should not be exposed to host in production.
    # Bind to localhost only when port exposure is needed for dev tooling.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis_data:
